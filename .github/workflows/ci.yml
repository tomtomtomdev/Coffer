name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest

    # S4 persistence tests run against a real Postgres (SQLite differs on NUMERIC /
    # locking / ON CONFLICT). The `coffer` user is a superuser so the migration test
    # can create/drop its own throwaway database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: coffer
          POSTGRES_PASSWORD: coffer
          POSTGRES_DB: coffer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      COFFER_DATABASE_URL: postgresql+psycopg://coffer:coffer@localhost:5432/coffer_test
      # Throwaway Fernet key — CI encrypts only synthetic test data, protects nothing real.
      COFFER_ENCRYPTION_KEY: d-18lHMEKJzTS-pnc_z37hhdf7Bud4hp230PChXzLZk=

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Types (mypy --strict)
        run: uv run mypy

      - name: Layer contract (import-linter)
        run: uv run lint-imports

      - name: Tests (pytest)
        run: uv run pytest

  # Frontend (web/ — Vite + React UI layer). Independent of the Python gate; consumes
  # the read API over HTTP, so it needs no DB. tsc typecheck + Vitest + a production build.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Types (tsc --noEmit)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm run test

      - name: Build
        run: npm run build
