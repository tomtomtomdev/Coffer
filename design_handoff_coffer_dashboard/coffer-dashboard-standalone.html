document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-webkit-overflow-scrolling: touch; }\n    .__phead, .__prow, .__ptotal { min-width: 540px; }\n    .__brandsub { display: none; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"--paper:#eaecf6;--card:#ffffff;--ink:#1c1d26;--muted:#8a8fa3;--faint:#b4b8c9;--border:#edeef5;--cardbd:#eef0f6;--sh:0 6px 22px rgba(28,29,60,0.06);--cash:#17b26a;--port:#7c5cff;--liab:#f04766;--orange:#f59e0b;--green:#17b26a;--red:#f04766;--display:'Plus Jakarta Sans','Hanken Grotesk',sans-serif;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'Plus Jakarta Sans','Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:78px;\">\n\n  <header style=\"position:sticky;top:0;z-index:20;background:rgba(234,236,246,0.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);\">\n    <div class=\"__hdrpad\" style=\"max-width:1120px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;\">\n      <div style=\"display:flex;align-items:center;gap:11px;min-width:0;\">\n        <div style=\"display:flex;\">\n          <div style=\"width:30px;height:30px;border-radius:50%;background:var(--cash);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:2px solid var(--card);\">T<\u002Fdiv>\n          <div style=\"width:30px;height:30px;border-radius:50%;background:var(--port);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:2px solid var(--card);margin-left:-9px;\">P<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"min-width:0;\">\n          <div style=\"font-family:var(--display);font-weight:800;font-size:20px;line-height:1;letter-spacing:-0.02em;\">Coffer<\u002Fdiv>\n          <div class=\"__brandsub\" style=\"font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;\">Tommy &amp; Priskila<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <nav style=\"display:flex;gap:2px;margin-left:auto;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:3px;\" class=\"__topnav\">\n        <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ t.onClick }}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:7px 14px;border-radius:9px;background:{{ t.bg }};color:{{ t.fg }};transition:all .15s;white-space:nowrap;\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fnav>\n\n      <div style=\"margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;\">\n        <span style=\"width:6px;height:6px;border-radius:50%;background:var(--cash);\"><\u002Fspan>{{ monthLabel }}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main class=\"__main\" style=\"max-width:1120px;margin:0 auto;padding:24px 20px 40px;\">\n\n    <!-- ============ OVERVIEW / NET WORTH ============ -->\n    <sc-if value=\"{{ isOverview }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"animation:fadeUp .4s ease both;\">\n      <div style=\"display:grid;grid-template-columns:1fr;gap:18px;\">\n\n        <div style=\"background:var(--card);border:1px solid var(--cardbd);border-radius:24px;box-shadow:var(--sh);padding:24px;\">\n          <div style=\"display:flex;flex-wrap:wrap;align-items:flex-start;gap:16px;justify-content:space-between;\">\n            <div>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);\">Kekayaan Bersih Rumah Tangga<\u002Fdiv>\n              <div style=\"font-family:var(--display);font-weight:800;font-size:clamp(38px,7.5vw,56px);line-height:1.02;margin-top:8px;letter-spacing:-0.01em;\">{{ netWorthStr }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;\">\n                <span style=\"display:inline-flex;align-items:center;gap:4px;font-weight:600;font-size:14px;color:var(--green);background:#e3f7ee;padding:3px 9px;border-radius:20px;\">↑ {{ netWorthDeltaStr }}<\u002Fspan>\n                <span style=\"font-size:13px;color:var(--muted);\">vs. bulan lalu · per 30 Jun 2026<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;background:var(--paper);border:1px solid var(--border);border-radius:11px;padding:3px;\">\n              <button onclick=\"{{ setHousehold }}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:7px 13px;border-radius:8px;background:{{ hhBg }};color:{{ hhFg }};\">Gabungan<\u002Fbutton>\n              <button onclick=\"{{ setMember }}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:7px 13px;border-radius:8px;background:{{ mbBg }};color:{{ mbFg }};\">Per Anggota<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:18px;min-height:220px;\">{{ tideChart }}<\u002Fdiv>\n\n          <div style=\"display:flex;flex-wrap:wrap;gap:16px;margin-top:6px;\">\n            <sc-for list=\"{{ tideLegend }}\" as=\"l\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);\">\n                <span style=\"width:11px;height:11px;border-radius:3px;background:{{ l.color }};\"><\u002Fspan>{{ l.label }}\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"margin:14px 0 0;font-size:11.5px;color:var(--faint);line-height:1.5;border-top:1px dashed var(--border);padding-top:12px;\">Setiap titik = saldo akhir-bulan (grid), memakai laporan terakhir dengan <em>period_end ≤ tanggal grid<\u002Fem> (carry-forward). Menyelaraskan periode laporan tabungan, kartu kredit, dan broker yang tidak sinkron.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\" class=\"__kpis\">\n          <button onclick=\"{{ setSpend }}\" style=\"text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--cardbd);border-radius:20px;box-shadow:var(--sh);padding:18px;font-family:inherit;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);\">Belanja Rutin / bln<\u002Fdiv>\n            <div style=\"font-family:var(--display);font-weight:800;font-size:31px;margin-top:6px;\">{{ routineStr }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--muted);margin-top:5px;\">+ {{ routineAnnualStr }} amortisasi tahunan<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ setCashflow }}\" style=\"text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--cardbd);border-radius:20px;box-shadow:var(--sh);padding:18px;font-family:inherit;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);\">Tingkat Menabung<\u002Fdiv>\n            <div style=\"font-family:var(--display);font-weight:800;font-size:31px;margin-top:6px;color:var(--cash);\">{{ savingsRateStr }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--muted);margin-top:5px;\">(pendapatan − belanja) / pendapatan<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ setCashflow }}\" style=\"text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--cardbd);border-radius:20px;box-shadow:var(--sh);padding:18px;font-family:inherit;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);\">Arus Kas Bulanan<\u002Fdiv>\n            <div style=\"font-family:var(--display);font-weight:800;font-size:31px;margin-t erflow:hidden;\">\n        <div style=\"display:grid;grid-template-columns:1.6fr 0.7fr 1fr 1fr 1.1fr;gap:8px;padding:13px 18px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);\" class=\"__phead\">\n          <div>Emiten<\u002Fdiv><div>Broker<\u002Fdiv><div style=\"text-align:right;\">Lot<\u002Fdiv><div style=\"text-align:right;\">Avg / Harga<\u002Fdiv><div style=\"text-align:right;\">Nilai / P&amp;L<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ holdings }}\" as=\"h\" hint-placeholder-count=\"8\">\n          <div style=\"display:grid;grid-template-columns:1.6fr 0.7fr 1fr 1fr 1.1fr;gap:8px;padding:13px 18px;border-bottom:1px solid var(--border);align-items:center;\" class=\"__prow\">\n            <div>\n              <div style=\"display:flex;align-items:center;gap:8px;\">\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;\">{{ h.ticker }}<\u002Fspan>\n                <sc-if value=\"{{ h.hasCA }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:9px;font-weight:600;color:var(--liab);background:#fde3e8;padding:2px 6px;border-radius:6px;\">CORP ACTION<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:11.5px;color:var(--muted);\">{{ h.name }}<\u002Fdiv>\n              <sc-if value=\"{{ h.hasCA }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:10.5px;color:var(--liab);margin-top:3px;\">↳ {{ h.caNote }}<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--muted);\">{{ h.broker }}<\u002Fdiv>\n            <div style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:13px;\">{{ h.lots }}<div style=\"font-size:10px;color:var(--faint);\">{{ h.shares }} lbr<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12.5px;\">{{ h.avg }}<div style=\"font-size:11px;color:var(--muted);\">{{ h.price }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:right;\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13.5px;\">{{ h.mv }}<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:{{ h.plColor }};\">{{ h.pl }} ({{ h.plPct }})<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div class=\"__ptotal\" style=\"display:grid;grid-template-columns:1.6fr 0.7fr 1fr 1fr 1.1fr;gap:8px;padding:14px 18px;background:var(--paper);align-items:center;\">\n          <div style=\"font-weight:700;font-size:13px;\">Total Rumah Tangga<\u002Fdiv>\n          <div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv>\n          <div style=\"text-align:right;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;\">{{ portfolioTotalStr }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:{{ portfolioPLColor }};\">{{ portfolioPLStr }} ({{ portfolioPLPct }})<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SPEND ============ -->\n    <sc-if value=\"{{ isSpend }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"animation:fadeUp .4s ease both;\">\n      <div style=\"background:var(--card);border:1px solid var(--cardbd);border-radius:24px;box-shadow:var(--sh);padding:24px;margin-bottom:18px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);\">Estimasi Belanja Rutin<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:baseline;gap:14px;margin-top:8px;\">\n          <div style=\"font-family:var(--display);font-weight:800;font-size:clamp(34px,6.5vw,48px);line-height:1;\">{{ routineStr }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--muted);\">median dari total bulanan · <span style=\"color:var(--ink);font-weight:600;\">+ {{ routineAnnualStr }}<\u002Fspan> amortisasi tahunan = <span style=\"color:var(--ink);font-weight:600;font-family:'IBM Plex Mono',monospace;\">{{ routineAllInStr }}<\u002Fspan>/bln<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:6px;align-items:flex-end;height:70px;margin-top:20px;\">\n          <sc-for list=\"{{ routineTrend }}\" as=\"m\" hint-placeholder-count=\"6\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%;\">\n              <div style=\"width:100%;max-width:34px;border-radius:5px 5px 0 0;background:{{ m.color }};height:{{ m.h }};min-height:4px;\"><\u002Fdiv>\n              <span style=\"font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;\">{{ m.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"margin:16px 0 0;font-size:11.5px;color:var(--faint);line-height:1.5;border-top:1px dashed var(--border);padding-top:12px;\">Rincian per-kategori memakai median masing-masing; jumlahnya <em>tidak<\u002Fem> harus sama dengan angka utama (kategori jarang memuncak di bulan yang sama). Cold-start: &lt; 3 bulan data ⇒ tidak menampilkan estimasi.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:var(--card);border:1px solid var(--cardbd);border-radius:20px;box-shadow:var(--sh);padding:20px 22px;margin-bottom:18px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;\">Rincian per Kategori · median bulanan<\u002Fdiv>\n        <sc-for list=\"{{ routineCats }}\" as=\"c\" hint-placeholder-count=\"10\">\n          <div style=\"margin-bottom:13px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:5px;\">\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:500;\">{{ c.label }}<span style=\"font-size:9.5px;font-weight:600;color:var(--muted);background:var(--paper);border:1px solid var(--border);padding:2px 7px;border-radius:5px;\">{{ c.cadence }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;\">{{ c.medStr }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"height:8px;background:var(--paper);border-radius:5px;overflow:hidden;\"><div style=\"height:100%;width:{{ c.pct }};background:{{ c.color }};border-radius:5px;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:#fef0f2;border:1px solid #fbdbe1;border-radius:20px;padding:18px 20px;margin-bottom:18px;box-shadow:var(--sh);\">\n        <div style=\"display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;color:#c0304a;margin-bottom:12px;\"><span>⚠<\u002Fspan> Perlu Ditinjau — kemungkinan bukan rutin<\u002Fdiv>\n        <sc-for list=\"{{ anomalies }}\" as=\"x\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-top:1px solid #fbdbe1;\">\n            <div><div style=\"font-size:13px;font-weight:500;\">{{ x.desc }}<\u002Fdiv><div style=\"font-size:11.5px;color:#c47488;font-family:'IBM Plex Mono',monospace;\">{{ x.reason }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;color:var(--liab);\">{{ x.amt }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:var(--card);border:1px solid var(--cardbd);border-radius:20px;box-shadow:var(--sh);padding:20px 22px;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);\">Antrean Kategorisasi<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--faint);\">urutan: parser → aturan pelajaran → regex → belum terkategori<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ reviewRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--border);\">\n            <div style=\"min-width:0;flex:1;\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ r.desc }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;\">\n                <span style=\"font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;color:{{ r.badgeFg }};background:{{ r.badgeBg }};\">{{ r.badge }}<\u002Fspan>\n                <span style=\"font-size:11.5px;color:var(--muted);\">{{ r.cat }}<\u002Fspan>\n                <sc-if value=\"{{ r.hasAcct }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10.5px;color:var(--faint);font-family:'IBM Plex Mono',monospace;\">→ {{ r.acct }}<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:right;flex:none;\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;\">{{ r.amt }}<\u002Fdiv>\n              <div style=\"font-size:11px;font-weight:600;color:{{ r.actionColor }};margin-top:2px;cursor:pointer;\">{{ r.action }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ CASH FLOW ============ -->\n    <sc-if value=\"{{ isCashflow }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"animation:fadeUp .4s ease both;\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;\" class=\"__pcards\">\n        <div style=\"background:var(--card);border:1px solid var(--cardbd);border-radius:20px;box-shadow:var(--sh);padding:18px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);\">Tingkat Menabung<\u002Fdiv>\n          <div style=\"font-family:var(--display);font-weight:800;font-size:37px;margin-top:6px;color:var(--cash);\">{{ savingsRateStr }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:var(--muted);margin-top:5px;\">rata-rata 6 bulan<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--cardbd);border-radius:20px;box-shadow:var(--sh);padding:18px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);\">Arus Kas · Juni<\u002Fdiv>\n          <div style=\"font-family:var(--display);font-weight:800;font-size:37px;margin-top:6px;color:var(--green);\">{{ cashFlowStr }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:var(--muted);margin-top:5px;\">pendapatan − belanja<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:var(--card);border:1px solid var(--cardbd);border-radius:24px;box-shadow:var(--sh);padding:22px;margin-bottom:18px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;\">Pendapatan vs Belanja · tingkat menabung<\u002Fdiv>\n        <div style=\"min-height:230px;\">{{ incomeChart }}<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:16px;margin-top:8px;\">\n          <sc-for list=\"{{ incomeLegend }}\" as=\"l\" hint-placeholder-count=\"3\">\n            <div style=\"display xed(1)+' '+q.y.toFixed(1)).join(' L ')+' Z'; }\n\n  buildTide(mode) {\n    const e = React.createElement, C = this.C, d = this.data;\n    const W=680,H=300,L=14,R=16,T=26,B=34,n=6;\n    const x=i=>L+i*((W-L-R)/(n-1)), baseY=H-B, innerH=H-T-B;\n    const kids=[];\n    kids.push(e('defs',{key:'d'},\n      e('linearGradient',{id:'gPort',x1:0,y1:0,x2:0,y2:1,key:'p'},\n        e('stop',{offset:'0%',stopColor:C.port,stopOpacity:0.26,key:1}),\n        e('stop',{offset:'100%',stopColor:C.port,stopOpacity:0.03,key:2})),\n      e('linearGradient',{id:'gCash',x1:0,y1:0,x2:0,y2:1,key:'c'},\n        e('stop',{offset:'0%',stopColor:C.cash,stopOpacity:0.30,key:1}),\n        e('stop',{offset:'100%',stopColor:C.cash,stopOpacity:0.05,key:2}))\n    ));\n    let max;\n    if (mode==='member') max = Math.max(...d.hadi,...d.pris)*1.15;\n    else max = Math.max(...d.cash.map((c,i)=>c+d.port[i]))*1.15;\n    const Y=v=>baseY-(v/max)*innerH;\n    for(let g=0; g<=3; g++){ const gv=max*g/3, gy=Y(gv);\n      kids.push(e('line',{key:'g'+g,x1:L,y1:gy,x2:W-R,y2:gy,stroke:C.border,strokeWidth:1}));\n      kids.push(e('text',{key:'gt'+g,x:L,y:gy-4,fontSize:10,fill:C.faint,fontFamily:'IBM Plex Mono'}, this.fmtShort(gv)));\n    }\n    if (mode==='member') {\n      const hp=d.hadi.map((v,i)=>({x:x(i),y:Y(v)})), pp=d.pris.map((v,i)=>({x:x(i),y:Y(v)}));\n      kids.push(e('path',{key:'hl',d:this._line(hp),fill:'none',stroke:C.cash,strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round'}));\n      kids.push(e('path',{key:'pl',d:this._line(pp),fill:'none',stroke:C.port,strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round'}));\n      hp.forEach((p,i)=>kids.push(e('circle',{key:'hc'+i,cx:p.x,cy:p.y,r:i===n-1?4.5:3,fill:i===n-1?C.cash:C.card,stroke:C.cash,strokeWidth:2})));\n      pp.forEach((p,i)=>kids.push(e('circle',{key:'pc'+i,cx:p.x,cy:p.y,r:i===n-1?4.5:3,fill:i===n-1?C.port:C.card,stroke:C.port,strokeWidth:2})));\n    } else {\n      const assets=d.cash.map((c,i)=>c+d.port[i]);\n      const baseY-Y(d.spend[i]),rx:4,fill:C.liab,fillOpacity:0.85}));\n      kids.push(e('text',{key:'xl'+i,x:cx,y:H-10,fontSize:11,fill:C.muted,textAnchor:'middle',fontFamily:'IBM Plex Mono'},d.months[i]));\n    });\n    const rate=d.income.map((iv,i)=>Math.round((iv-d.spend[i])/iv*100));\n    const rp=rate.map((v,i)=>({x:gx(i)+gw/2,y:Yr(v)}));\n    kids.push(e('path',{key:'rl',d:this._line(rp),fill:'none',stroke:C.ink,strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round',strokeDasharray:'1 6'}));\n    rp.forEach((p,i)=>{\n      kids.push(e('circle',{key:'rc'+i,cx:p.x,cy:p.y,r:3.5,fill:C.card,stroke:C.ink,strokeWidth:2}));\n      kids.push(e('text',{key:'rt'+i,x:p.x,y:p.y-9,fontSize:10.5,fontWeight:600,fill:C.ink,textAnchor:'middle',fontFamily:'IBM Plex Mono'},rate[i]+'%'));\n    });\n    return e('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',style:{height:'auto',display:'block'},preserveAspectRatio:'xMidYMid meet'},kids);\n  }\n\n  setView(v){ this.setState({ view:v }); if(typeof window!=='undefined') window.scrollTo({top:0}); }\n\n  renderVals() {\n    const C = this.C, d = this.data;\n    const view = this.state.view ?? this.props.startView ?? 'overview';\n    const mode = this.state.nwMode;\n\n    const tabDefs = [\n      { key:'overview', label:'Ringkasan' },\n      { key:'portfolio', label:'Portofolio' },\n      { key:'spend', label:'Belanja' },\n      { key:'cashflow', label:'Arus Kas' }\n    ];\n    const tabs = tabDefs.map(t => {\n      const active = view === t.key;\n      return { label:t.label, onClick:()=>this.setView(t.key),\n        bg: active ? C.port : 'transparent', fg: active ? '#fff' : C.muted,\n        navFg: active ? C.port : C.faint, navMark: active ? C.port : 'transparent' };\n    });\n\n    // portfolio computed\n    let totalMV=0, totalCost=0;\n    const holdings = this.holdings.map(h => {\n      const sh=h.lots*100, mv=sh*h.price, cost=sh*h.avg, pl=mv-cost, plPct=pl/cost*100;\n      totalMV+=mv; totalCost+=cost;\n      return { ticker:h.ticker,    setSpend:()=>this.setView('spend'), setCashflow:()=>this.setView('cashflow'),\n\n      // net worth hero\n      netWorthStr:this.fmtRp(943000000), netWorthDeltaStr:'Rp 35 jt (3,9%)',\n      setHousehold:()=>this.setState({nwMode:'household'}), setMember:()=>this.setState({nwMode:'member'}),\n      hhBg: mode==='household'?C.card:'transparent', hhFg: mode==='household'?C.ink:C.muted,\n      mbBg: mode==='member'?C.card:'transparent', mbFg: mode==='member'?C.ink:C.muted,\n      tideChart: this.buildTide(mode),\n      tideLegend: mode==='member'\n        ? [{label:'Bersih — Tommy',color:C.cash},{label:'Bersih — Priskila',color:C.port}]\n        : [{label:'Kas',color:C.cash},{label:'Portofolio',color:C.port},{label:'Kekayaan bersih',color:C.ink}],\n      accounts,\n\n      // KPIs\n      routineStr:'Rp 23,8 jt', routineAnnualStr:'Rp 1,87 jt', routineAllInStr:'Rp 25,67 jt',\n      savingsRateStr:'47%', cashFlowStr:'+Rp 32 jt',\n\n      // portfolio\n      portfolioTotalStr:this.fmtRp(totalMV), holdingsCount:this.holdings.length,\n      portfolioPLStr:(totalPL>=0?'+':'−')+this.fmtRp(Math.abs(totalPL)).replace('Rp','Rp '),\n      portfolioPLPct:(totalPL>=0?'+':'−')+Math.abs(totalPLPct).toFixed(1)+'%',\n      portfolioPLColor: totalPL>=0?C.green:C.red, holdings,\n\n      // spend\n      routineCats, routineTrend,\n      anomalies:[\n        {desc:'Belanja Groceries · 14 Mei', amt:this.fmtRp(9800000), reason:'2,3× median kategori (Rp 4,2 jt) · butuh ≥3 observasi ✓'},\n        {desc:'Apotek & Klinik · 03 Jun', amt:this.fmtRp(1450000), reason:'2,3× median (Rp 620 rb) · tinjau apakah rutin'}\n      ],\n      reviewRows,\n\n      // cashflow\n      incomeChart:this.buildIncome(),\n      incomeLegend:[{label:'Pendapatan',color:C.cash},{label:'Belanja',color:C.liab},{label:'Tingkat menabung',color:C.ink}],\n      incomeSources:[{label:'Gaji · Tommy',amt:this.fmtRp(38000000)},{label:'Gaji · Priskila',amt:this.fmtRp(22000000)},{label:'Lainnya · bonus/bunga',amt:this.fmtRp(6000000)}],\n      spendTypes:[{label:'Rutin',amt:this.fmtRp(23800000)},{label:'Discretionary',amt:this.fmtRp(7900000)},{label:'One-off',amt:this.fmtRp(2300000)}]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
